<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>FoilDex — карточный коллекционер</title>
<link rel="stylesheet" href="style.css">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

<div id="app">
  <div id="toast-root"></div>

  <!-- ===== HOME ===== -->
  <div class="screen active" id="screen-home">
    <div class="topbar">
      <div class="brand">FOIL<span>DEX</span></div>
      <div class="topbar-right">
        <button class="icon-btn" id="sound-toggle-btn">🔊</button>
        <div class="currency"><span class="icon">💎</span><span id="shard-count">0</span></div>
      </div>
    </div>
    <div class="content" id="home-content"></div>
  </div>

  <!-- ===== COLLECTION ===== -->
  <div class="screen" id="screen-collection">
    <div class="topbar">
      <div class="brand">Гримуар</div>
      <div class="currency"><span class="icon">💎</span><span id="shard-count-2">0</span></div>
    </div>
    <div class="content">
      <div class="filter-row" id="filter-row"></div>
      <div class="collection-grid" id="collection-grid"></div>
    </div>
  </div>

  <!-- ===== BATTLE SETUP ===== -->
  <div class="screen" id="screen-battle-setup">
    <div class="topbar">
      <div class="brand">Арена</div>
      <div class="currency"><span class="icon">💎</span><span id="shard-count-3">0</span></div>
    </div>
    <div class="content" id="battle-setup-content"></div>
  </div>

  <!-- ===== TABBAR ===== -->
  <div class="tabbar" id="tabbar">
    <button class="tab active" data-tab="home"><span class="ic">🏰</span>Логово</button>
    <button class="tab" data-tab="collection"><span class="ic">📖</span>Гримуар</button>
    <button class="tab" data-tab="battle"><span class="ic">⚔️</span>Арена</button>
  </div>

  <!-- ===== PACK OPENING ===== -->
  <div class="screen" id="screen-pack">
    <div class="topbar">
      <button class="btn ghost" id="pack-back-btn" style="width:auto;padding:8px 14px;">← Назад</button>
      <div class="currency"><span class="icon">💎</span><span id="shard-count-4">0</span></div>
    </div>
    <div class="pack-screen" id="pack-intro">
      <div class="pack-visual" id="pack-visual">
        <svg class="pack-sigil" viewBox="0 0 100 100">
          <circle cx="50" cy="50" r="34" fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.8"/>
          <circle cx="50" cy="50" r="26" fill="none" stroke="currentColor" stroke-width="0.7" stroke-dasharray="2 4" opacity="0.6"/>
          <path d="M50,20 L58,42 L80,50 L58,58 L50,80 L42,58 L20,50 L42,42 Z" fill="currentColor" opacity="0.9"/>
          <circle cx="50" cy="50" r="6" fill="currentColor"/>
        </svg>
      </div>
      <div class="pack-hint">Нажми на реликварий, чтобы вскрыть печать</div>
    </div>
    <div class="reveal-stage" id="reveal-stage">
      <div class="reveal-progress" id="reveal-progress">Карта 1 / 5</div>
      <div class="reveal-card-holder" id="reveal-card-holder"></div>
      <div class="reveal-new-tag" id="reveal-new-tag"></div>
      <button class="btn" id="reveal-next-btn" style="width:220px;">Далее</button>
    </div>
  </div>

  <!-- ===== CARD DETAIL MODAL ===== -->
  <div class="card-modal" id="card-modal">
    <div class="card-modal-sheet">
      <button type="button" class="card-modal-close" id="card-modal-close" aria-label="Закрыть">✕</button>
      <div id="card-modal-body"></div>
    </div>
  </div>

  <!-- ===== BATTLE LOG ===== -->
  <div class="screen" id="screen-battle-log">
    <div class="battle-log-screen">
      <div class="vs-row" id="vs-row"></div>
      <div class="log-box" id="log-box"></div>
      <div id="battle-result-holder"></div>
      <button class="btn" id="battle-log-done-btn" style="display:none;">Забрать награду</button>
    </div>
  </div>

</div>

<script src="js/cards.js"></script>
<script src="js/storage.js"></script>
<script src="js/art.js"></script>
<script src="js/lore.js"></script>
<script src="js/sound.js"></script>
<script src="js/pack.js"></script>
<script src="js/battle.js"></script>
<script src="js/app.js"></script>
</body>
</html>
