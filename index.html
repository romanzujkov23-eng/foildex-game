<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>FoilDex — карточный коллекционер</title>
<link rel="stylesheet" href="style.css">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

<div id="app">
  <div id="toast-root"></div>

  <!-- ===== HOME ===== -->
  <div class="screen active" id="screen-home">
    <div class="topbar">
      <div class="brand">FOIL<span>DEX</span></div>
      <div class="topbar-right">
        <button class="icon-btn" id="sound-toggle-btn">🔊</button>
        <div class="currency"><svg class="coin-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="coinBagGradStatic0" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f6d488"/>
      <stop offset="55%" stop-color="#e8b64a"/>
      <stop offset="100%" stop-color="#a9761f"/>
    </linearGradient>
  </defs>
  <path d="M9.3 5.2c0-1.7 1.1-3 2.7-3s2.7 1.3 2.7 3" fill="none" stroke="#8a6423" stroke-width="1.3" stroke-linecap="round"/>
  <path d="M7 6.1c-2.9 2.9-4 6.9-2.6 10.3C5.7 19.9 8.5 21.6 12 21.6s6.3-1.7 7.6-5.2C20.9 12.9 20 8.9 17 6.1c-1.6 0.95-3.2 1.35-5 1.35S8.6 7.05 7 6.1z" fill="url(#coinBagGradStatic0)" stroke="#8a6423" stroke-width="0.7"/>
  <path d="M7.3 8.9c2.8 1.4 6.6 1.4 9.4 0" fill="none" stroke="#8a6423" stroke-width="0.6" opacity="0.55"/>
  <circle cx="12" cy="14.6" r="2.6" fill="#fff3d6" opacity="0.3"/>
  <circle cx="12" cy="14.6" r="2.1" fill="none" stroke="#8a6423" stroke-width="0.7"/>
</svg><span id="shard-count">0</span></div>
      </div>
    </div>
    <div class="content" id="home-content"></div>
  </div>

  <!-- ===== COLLECTION ===== -->
  <div class="screen" id="screen-collection">
    <div class="topbar">
      <div class="brand">Гримуар</div>
      <div class="currency"><svg class="coin-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="coinBagGradStatic1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f6d488"/>
      <stop offset="55%" stop-color="#e8b64a"/>
      <stop offset="100%" stop-color="#a9761f"/>
    </linearGradient>
  </defs>
  <path d="M9.3 5.2c0-1.7 1.1-3 2.7-3s2.7 1.3 2.7 3" fill="none" stroke="#8a6423" stroke-width="1.3" stroke-linecap="round"/>
  <path d="M7 6.1c-2.9 2.9-4 6.9-2.6 10.3C5.7 19.9 8.5 21.6 12 21.6s6.3-1.7 7.6-5.2C20.9 12.9 20 8.9 17 6.1c-1.6 0.95-3.2 1.35-5 1.35S8.6 7.05 7 6.1z" fill="url(#coinBagGradStatic1)" stroke="#8a6423" stroke-width="0.7"/>
  <path d="M7.3 8.9c2.8 1.4 6.6 1.4 9.4 0" fill="none" stroke="#8a6423" stroke-width="0.6" opacity="0.55"/>
  <circle cx="12" cy="14.6" r="2.6" fill="#fff3d6" opacity="0.3"/>
  <circle cx="12" cy="14.6" r="2.1" fill="none" stroke="#8a6423" stroke-width="0.7"/>
</svg><span id="shard-count-2">0</span></div>
    </div>
    <div class="content">
      <div class="filter-row" id="filter-row"></div>
      <div class="collection-grid" id="collection-grid"></div>
    </div>
  </div>

  <!-- ===== LEVEL MAP (Арена) ===== -->
  <div class="screen" id="screen-battle-setup">
    <div class="topbar">
      <div class="brand-row">
        <div class="brand">Арена</div>
        <button class="rules-btn-inline" id="levels-rules-btn" aria-label="Правила игры"></button>
      </div>
      <div class="currency"><svg class="coin-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="coinBagGradStatic2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f6d488"/>
      <stop offset="55%" stop-color="#e8b64a"/>
      <stop offset="100%" stop-color="#a9761f"/>
    </linearGradient>
  </defs>
  <path d="M9.3 5.2c0-1.7 1.1-3 2.7-3s2.7 1.3 2.7 3" fill="none" stroke="#8a6423" stroke-width="1.3" stroke-linecap="round"/>
  <path d="M7 6.1c-2.9 2.9-4 6.9-2.6 10.3C5.7 19.9 8.5 21.6 12 21.6s6.3-1.7 7.6-5.2C20.9 12.9 20 8.9 17 6.1c-1.6 0.95-3.2 1.35-5 1.35S8.6 7.05 7 6.1z" fill="url(#coinBagGradStatic2)" stroke="#8a6423" stroke-width="0.7"/>
  <path d="M7.3 8.9c2.8 1.4 6.6 1.4 9.4 0" fill="none" stroke="#8a6423" stroke-width="0.6" opacity="0.55"/>
  <circle cx="12" cy="14.6" r="2.6" fill="#fff3d6" opacity="0.3"/>
  <circle cx="12" cy="14.6" r="2.1" fill="none" stroke="#8a6423" stroke-width="0.7"/>
</svg><span id="shard-count-3">0</span></div>
    </div>
    <div class="content" id="levels-content"></div>
  </div>

  <!-- ===== DECK BUILDER ===== -->
  <div class="screen" id="screen-deckbuilder">
    <div class="topbar">
      <button class="btn ghost" id="deckbuilder-back-btn" style="width:auto;padding:8px 14px;">← Назад</button>
      <div class="brand" style="font-size:15px;">Сбор колоды</div>
    </div>
    <div class="content" id="deckbuilder-content"></div>
  </div>

  <!-- ===== SHOP ===== -->
  <div class="screen" id="screen-shop">
    <div class="topbar">
      <div class="brand">Лавка</div>
      <div class="currency"><svg class="coin-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="coinBagGradStatic4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f6d488"/>
      <stop offset="55%" stop-color="#e8b64a"/>
      <stop offset="100%" stop-color="#a9761f"/>
    </linearGradient>
  </defs>
  <path d="M9.3 5.2c0-1.7 1.1-3 2.7-3s2.7 1.3 2.7 3" fill="none" stroke="#8a6423" stroke-width="1.3" stroke-linecap="round"/>
  <path d="M7 6.1c-2.9 2.9-4 6.9-2.6 10.3C5.7 19.9 8.5 21.6 12 21.6s6.3-1.7 7.6-5.2C20.9 12.9 20 8.9 17 6.1c-1.6 0.95-3.2 1.35-5 1.35S8.6 7.05 7 6.1z" fill="url(#coinBagGradStatic4)" stroke="#8a6423" stroke-width="0.7"/>
  <path d="M7.3 8.9c2.8 1.4 6.6 1.4 9.4 0" fill="none" stroke="#8a6423" stroke-width="0.6" opacity="0.55"/>
  <circle cx="12" cy="14.6" r="2.6" fill="#fff3d6" opacity="0.3"/>
  <circle cx="12" cy="14.6" r="2.1" fill="none" stroke="#8a6423" stroke-width="0.7"/>
</svg><span id="shard-count-4">0</span></div>
    </div>
    <div class="content" id="shop-content"></div>
  </div>

  <!-- ===== TABBAR ===== -->
  <div class="tabbar" id="tabbar">
    <button class="tab active" data-tab="home"><span class="ic" data-icon="home"></span>Логово</button>
    <button class="tab" data-tab="collection"><span class="ic" data-icon="grimoire"></span>Гримуар</button>
    <button class="tab" data-tab="shop"><span class="ic" data-icon="shop"></span>Лавка</button>
    <button class="tab" data-tab="battle"><span class="ic" data-icon="arena"></span>Арена</button>
  </div>

  <!-- ===== PACK OPENING ===== -->
  <div class="screen" id="screen-pack">
    <div class="topbar">
      <button class="btn ghost" id="pack-back-btn" style="width:auto;padding:8px 14px;">← Назад</button>
      <div class="currency"><svg class="coin-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="coinBagGradStatic3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f6d488"/>
      <stop offset="55%" stop-color="#e8b64a"/>
      <stop offset="100%" stop-color="#a9761f"/>
    </linearGradient>
  </defs>
  <path d="M9.3 5.2c0-1.7 1.1-3 2.7-3s2.7 1.3 2.7 3" fill="none" stroke="#8a6423" stroke-width="1.3" stroke-linecap="round"/>
  <path d="M7 6.1c-2.9 2.9-4 6.9-2.6 10.3C5.7 19.9 8.5 21.6 12 21.6s6.3-1.7 7.6-5.2C20.9 12.9 20 8.9 17 6.1c-1.6 0.95-3.2 1.35-5 1.35S8.6 7.05 7 6.1z" fill="url(#coinBagGradStatic3)" stroke="#8a6423" stroke-width="0.7"/>
  <path d="M7.3 8.9c2.8 1.4 6.6 1.4 9.4 0" fill="none" stroke="#8a6423" stroke-width="0.6" opacity="0.55"/>
  <circle cx="12" cy="14.6" r="2.6" fill="#fff3d6" opacity="0.3"/>
  <circle cx="12" cy="14.6" r="2.1" fill="none" stroke="#8a6423" stroke-width="0.7"/>
</svg><span id="shard-count-4">0</span></div>
    </div>
    <div class="pack-screen" id="pack-intro">
      <div class="pack-name-label" id="pack-name-label">Тёмный бустер</div>
      <div class="pack-visual" id="pack-visual">
        <svg class="pack-sigil" viewBox="0 0 100 100">
          <circle cx="50" cy="50" r="34" fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.8"/>
          <circle cx="50" cy="50" r="26" fill="none" stroke="currentColor" stroke-width="0.7" stroke-dasharray="2 4" opacity="0.6"/>
          <path d="M50,20 L58,42 L80,50 L58,58 L50,80 L42,58 L20,50 L42,42 Z" fill="currentColor" opacity="0.9"/>
          <circle cx="50" cy="50" r="6" fill="currentColor"/>
        </svg>
      </div>
      <div class="pack-hint">Нажми на реликварий, чтобы вскрыть печать</div>
      <div class="pity-panel" id="pity-panel"></div>
    </div>
    <div class="reveal-stage" id="reveal-stage">
      <div class="reveal-flash" id="reveal-flash"></div>
      <div class="lucky-banner" id="lucky-banner">🍀 ВЕЗУЧИЙ БУСТЕР<br><span>Редкость всех карт повышена!</span></div>
      <div class="reveal-progress" id="reveal-progress">Карта 1 / 5</div>
      <div class="reveal-card-holder" id="reveal-card-holder"></div>
      <div class="reveal-new-tag" id="reveal-new-tag"></div>
      <button class="btn" id="reveal-next-btn" style="width:220px;">Далее</button>
    </div>
  </div>

  <!-- ===== CARD DETAIL MODAL ===== -->
  <div class="card-modal" id="card-modal">
    <div class="card-modal-sheet" id="card-modal-sheet">
      <button type="button" class="card-modal-close" id="card-modal-close" aria-label="Закрыть">✕</button>
      <div id="card-modal-body"></div>
    </div>
  </div>

  <div class="card-modal" id="rules-modal">
    <div class="card-modal-sheet rules-sheet" id="rules-modal-sheet">
      <button type="button" class="card-modal-close" id="rules-modal-close" aria-label="Закрыть">✕</button>
      <div id="rules-modal-body"></div>
    </div>
  </div>

  <!-- ===== BATTLE ARENA (интерактивный бой) ===== -->
  <div class="screen" id="screen-battle">
    <div class="battle-arena" id="battle-arena">
      <button class="rules-btn" id="battle-rules-btn" aria-label="Правила боя"></button>
      <div class="bf-enemy-info" id="bf-enemy-info">
        <div class="bf-name" id="bf-enemy-name">Соперник</div>
        <div class="hp-bar-row">
          <div class="hp-bar"><div class="hp-bar-fill" id="bf-enemy-hp-fill"></div></div>
          <span class="hp-bar-text" id="bf-enemy-hp-text">30/30</span>
        </div>
        <div class="deck-count" id="bf-enemy-deck-count">🂠 0</div>
      </div>

      <div class="board-row enemy" id="bf-enemy-board"></div>

      <div class="battle-log-strip" id="battle-log-strip"></div>

      <div class="board-row player" id="bf-player-board"></div>

      <div class="bf-player-info">
        <div class="hp-bar-row">
          <span class="hp-bar-text" id="bf-player-hp-text">30/30</span>
          <div class="hp-bar"><div class="hp-bar-fill mine" id="bf-player-hp-fill"></div></div>
        </div>
        <div class="mana-row" id="bf-mana-row"></div>
      </div>

      <div class="hand-row" id="bf-hand-row"></div>

      <button class="btn end-turn-btn" id="bf-end-turn-btn">Завершить ход</button>
    </div>

    <div class="battle-result-overlay" id="battle-result-overlay">
      <div class="battle-result-card" id="battle-result-card"></div>
    </div>
  </div>

</div>

<script src="js/cards.js"></script>
<script src="js/icons.js"></script>
<script src="js/storage.js"></script>
<script src="js/art.js"></script>
<script src="js/sound.js"></script>
<script src="js/shop.js"></script>
<script src="js/pack.js"></script>
<script src="js/levels.js"></script>
<script src="js/battle.js"></script>
<script src="js/app.js"></script>
</body>
</html>
